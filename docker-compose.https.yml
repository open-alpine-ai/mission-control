services:
  mission-control:
    image: openalpineai/mission-control:v1.41
    container_name: mission-control
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3000
      - MC_ENFORCE_HTTPS=1
      - MC_ENABLE_HSTS=1
      - OPENCLAW_HOME=/openclaw-state
      - MC_MCP_ENDPOINT_URL=http://127.0.0.1:3100/api/mcp/bridge
      - MC_MCP_API_TOKEN=${MC_MCP_API_TOKEN:-change-me}
      - MC_MCP_TIMEOUT_MS=10000
      - MC_MCP_RETRY_COUNT=2
    volumes:
      - mc-data:/app/.data
      - ${OPENCLAW_HOST_DIR:-./openclaw-state}:/openclaw-state
    restart: unless-stopped
    networks:
      - mcnet

  caddy:
    image: caddy:2
    container_name: mission-control-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mission-control
    networks:
      - mcnet

volumes:
  mc-data:
  caddy_data:
  caddy_config:

networks:
  mcnet:
    driver: bridge
